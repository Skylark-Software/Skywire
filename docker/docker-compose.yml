version: '3.8'

services:
  skywire:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: skywire
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - SKYWIRE_HOST=0.0.0.0
      - SKYWIRE_PORT=8765
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: For local audio routing (requires audio passthrough)
  # skywire-local:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: skywire-local
